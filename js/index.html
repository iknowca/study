<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
</head>
<body>
    <div id="alertBox" class="alert-box"><p id="title">알림창</p><button id="closeBox">닫기</button></div>
    <button onclick="openAlertBox('block')">alert</button>

    <button onclick="openIDBox()">ID</button>
    <button onclick="openPWDBox()">PWD</button>
    <script>
        function openAlertBox(setting) {
            document.getElementById('alertBox').style.display=setting;
        }

        function openIDBox() {
            document.getElementById('alertBox').style.display='block'
            document.getElementById('title').innerHTML = "ID를 입력하세요"
        }
        function openPWDBox() {
            document.getElementById('alertBox').style.display='block'
            document.getElementById('title').innerHTML = "PWd를 입력하세요"
        }
        
        document.getElementById('closeBox').addEventListener('click', ()=> {
            document.getElementById('alertBox').style.display = 'none'
        })

    </script>
</body>
</html>
